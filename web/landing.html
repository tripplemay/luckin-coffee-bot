<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>瑞幸点单助手</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, "PingFang SC", sans-serif; margin: 0; padding: 24px 18px 40px; background: #0b0b0f; color: #eee; }
    .wrap { max-width: 460px; margin: 0 auto; }
    .logo { font-size: 46px; text-align: center; }
    h1 { font-size: 24px; text-align: center; margin: 6px 0 4px; }
    .tag { text-align: center; color: #9aa; font-size: 14px; margin-bottom: 18px; }
    .feat { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 22px; }
    .feat span { background: #16161d; border: 1px solid #262630; border-radius: 999px; padding: 6px 12px; font-size: 12.5px; color: #cdd; }
    .card { background: #16161d; border-radius: 14px; padding: 18px; margin-bottom: 14px; }
    .card h2 { font-size: 16px; margin: 0 0 4px; }
    .card .sub { color: #9aa; font-size: 13px; margin-bottom: 12px; }
    a.btn { display: block; text-align: center; padding: 14px; border-radius: 999px; font-size: 16px; font-weight: 600; text-decoration: none; color: #fff; }
    a.tg { background: linear-gradient(90deg,#2aabee,#229ed9); }
    .wxid { background: #0e0e14; border: 1px solid #2a3; border-radius: 8px; padding: 10px 12px; text-align: center; font-size: 16px; letter-spacing: .5px; color: #8e8; user-select: all; }
    .qr { display: block; width: 180px; height: 180px; margin: 14px auto 4px; border-radius: 10px; background: #fff; padding: 8px; }
    .qrhint { text-align: center; color: #9aa; font-size: 12px; }
    ol { color: #cdd; font-size: 14px; line-height: 1.9; padding-left: 20px; margin: 4px 0 0; }
    .foot { color: #778; font-size: 12px; text-align: center; margin-top: 18px; line-height: 1.7; }
    .hide { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">☕</div>
    <h1>瑞幸点单助手</h1>
    <div class="tag">一句话 / 一条语音就能点咖啡，自动找最近门店，下单前确认价格，绝不乱扣款。</div>
    <div class="feat">
      <span>🗣 自然语言 & 语音</span><span>📍 自动找店</span><span>✅ 确认再下单</span><span>🎟 自动用券</span>
    </div>

    <div class="card" id="tg">
      <h2>📲 在 Telegram 打开</h2>
      <div class="sub">点下方按钮直接打开机器人，发 /start 开始。</div>
      <a class="btn tg" id="tglink" href="#">打开机器人</a>
    </div>

    <div class="card">
      <h2>怎么用</h2>
      <ol>
        <li>登录瑞幸账号（手机号 + 短信，免粘贴 Token）</li>
        <li>设置位置（分享定位 / 发地址 / 一键定位）</li>
        <li>直接说想喝什么，例如「来杯热的生椰拿铁」</li>
      </ol>
    </div>

    <div class="foot">用你自己的瑞幸账号下单、各付各的。下单前都会让你确认价格。<br>个人自用项目，请合理使用。</div>
  </div>
<script>
  const BOT = "{{BOT_USERNAME}}";
  if (BOT) { document.getElementById("tglink").href = "https://t.me/" + BOT; }
  else { document.getElementById("tg").classList.add("hide"); }
</script>
</body>
</html>
